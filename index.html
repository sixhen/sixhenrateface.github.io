<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DocSecure - Quản lý tài liệu an toàn</title>
    <meta name="description" content="Hệ thống quản lý tài liệu với bảo mật cao">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- ===== HEADER ===== -->
    <header class="header" id="appHeader">
        <div class="container">
            <div class="header-inner">
                <a href="#" class="logo" onclick="app.navigate('home')">
                    <i class="fas fa-shield-alt"></i>
                    <span>DocSecure</span>
                </a>
                
                <nav class="nav-main" id="mainNav">
                    <ul>
                        <li><a href="#" onclick="app.navigate('home')">Trang chủ</a></li>
                        <li><a href="#" onclick="app.navigate('documents')">Tài liệu</a></li>
                        <li class="admin-only" style="display:none;"><a href="#" onclick="app.navigate('admin')">Quản trị</a></li>
                    </ul>
                </nav>

                <div class="header-actions">
                    <button class="search-toggle" onclick="app.toggleSearch()">
                        <i class="fas fa-search"></i>
                    </button>
                    <div class="user-menu" id="userMenu"></div>
                    <button class="menu-toggle" onclick="app.toggleMobileMenu()">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <div class="search-bar" id="searchBar">
            <div class="container">
                <input type="text" id="searchInput" placeholder="Tìm kiếm tài liệu..." onkeyup="if(event.key==='Enter') app.search()">
                <button onclick="app.search()"><i class="fas fa-search"></i></button>
            </div>
        </div>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main id="mainContent">
        <!-- Nội dung sẽ được render bởi JavaScript -->
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col">
                    <h4><i class="fas fa-shield-alt"></i> DocSecure</h4>
                    <p>Hệ thống quản lý và bảo vệ tài liệu chuyên nghiệp</p>
                </div>
                <div class="footer-col">
                    <h4>Liên kết</h4>
                    <ul>
                        <li><a href="#" onclick="app.navigate('home')">Trang chủ</a></li>
                        <li><a href="#" onclick="app.navigate('documents')">Tài liệu</a></li>
                        <li><a href="#" onclick="app.navigate('about')">Giới thiệu</a></li>
                    </ul>
                </div>
                <div class="footer-col">
                    <h4>Hỗ trợ</h4>
                    <ul>
                        <li><a href="#" onclick="app.showHelp()">Hướng dẫn</a></li>
                        <li><a href="#" onclick="app.showHelp()">Báo cáo</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 DocSecure. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- ===== TOAST ===== -->
    <div id="toast" class="toast"></div>

    <!-- ===== MODAL ===== -->
    <div class="modal" id="modal" onclick="if(event.target===this) app.closeModal()">
        <div class="modal-content">
            <span class="modal-close" onclick="app.closeModal()">&times;</span>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- ===== DOCUMENT VIEWER ===== -->
    <div class="document-viewer" id="documentViewer" onclick="if(event.target===this) app.closeDocument()">
        <div class="viewer-content">
            <button class="viewer-close" onclick="app.closeDocument()">&times;</button>
            <div class="viewer-body" id="viewerBody">
                <div class="watermark-overlay" id="watermarkOverlay"></div>
                <div id="documentContent"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
