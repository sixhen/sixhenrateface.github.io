<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>LookMax Archive • Tài Liệu Độc Quyền</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --text: #e0e0e0;
      --text2: #a0a0a0;
      --accent: #d4af37;
      --accent2: #b8960f;
      --danger: #c0392b;
      --success: #27ae60;
      --shadow: 0 8px 30px rgba(0,0,0,0.6);
      --radius: 16px;
      --radius-sm: 10px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --font: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      padding: 0 16px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background var(--transition);
    }

    /* Container chính */
    .app {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding-top: 20px;
    }

    /* Header + Auth */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      background: var(--surface);
      padding: 16px 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .logo {
      font-weight: 700;
      font-size: 1.6rem;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #d4af37, #f5e7b3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .user-area {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(4px);
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #0a0a0a;
      font-weight: 700;
    }

    .btn-primary:hover {
      background: var(--accent2);
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(212, 175, 55, 0.3);
    }

    .btn:hover {
      background: #2c2c2c;
      border-color: #444;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-small {
      padding: 6px 14px;
      font-size: 0.8rem;
    }

    .username-display {
      font-weight: 600;
      color: var(--accent);
      background: rgba(212,175,55,0.1);
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 0.9rem;
    }

    /* Auth form */
    .auth-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: var(--shadow);
    }

    .input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 50px;
      font-size: 1rem;
      outline: none;
      transition: var(--transition);
      width: 100%;
    }

    .input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(212,175,55,0.2);
    }

    /* Tài liệu */
    .section-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .doc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .doc-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: all var(--transition);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .doc-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.5);
    }

    .doc-card.owned {
      border-left: 4px solid var(--accent);
    }

    .doc-title {
      font-weight: 700;
      font-size: 1.1rem;
    }

    .doc-meta {
      font-size: 0.8rem;
      color: var(--text2);
      display: flex;
      justify-content: space-between;
    }

    .price {
      font-weight: 700;
      color: var(--accent);
    }

    /* Viewer bảo vệ */
    .viewer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }

    .viewer-container {
      background: var(--surface);
      border-radius: var(--radius);
      max-width: 700px;
      width: 100%;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      position: relative;
    }

    .viewer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .protected-content {
      padding: 24px;
      overflow-y: auto;
      position: relative;
      min-height: 300px;
      user-select: none;
      -webkit-user-select: none;
    }

    .watermark {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-25deg);
      font-size: 3.5rem;
      font-weight: 900;
      color: rgba(212, 175, 55, 0.08);
      pointer-events: none;
      white-space: nowrap;
      z-index: 1;
    }

    /* Lịch sử */
    .history-list {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 16px;
      max-height: 200px;
      overflow-y: auto;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
      }
      .doc-grid {
        grid-template-columns: 1fr;
      }
    }

    canvas {
      display: none;
    }
  </style>
</head>
<body>
<div class="app" id="app"></div>

<script>
  (function() {
    // ---------- DATABASE ----------
    const STORAGE_KEY = 'lookmax_db';
    const SESSION_KEY = 'lookmax_session';

    function getDB() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        const defaultDB = {
          users: {},
          documents: [
            { id: 'doc1', title: 'Bí Kíp Mewing Chuyên Sâu', price: 199000, content: 'Nội dung độc quyền về kỹ thuật mewing nâng cao...', preview: 'Hướng dẫn đặt lưỡi đúng cách.' },
            { id: 'doc2', title: 'Skin Care Routine Tối Giản', price: 149000, content: 'Chu trình skincare 3 bước hiệu quả nhất.', preview: 'Sáng - tối khác biệt.' },
            { id: 'doc3', title: 'Góc Chụp Ảnh Nam Tính', price: 99000, content: 'Bố cục, ánh sáng, biểu cảm.', preview: 'Tạo dáng tự nhiên.' }
          ]
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultDB));
        return defaultDB;
      }
      return JSON.parse(raw);
    }

    function saveDB(db) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
    }

    function getSession() {
      return JSON.parse(localStorage.getItem(SESSION_KEY));
    }

    function setSession(username) {
      localStorage.setItem(SESSION_KEY, JSON.stringify({ username, loginTime: Date.now() }));
    }

    function clearSession() {
      localStorage.removeItem(SESSION_KEY);
    }

    // Khởi tạo
    let db = getDB();
    let currentUser = getSession()?.username || null;

    // ---------- HÀM TIỆN ÍCH ----------
    function formatMoney(amount) {
      return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
    }

    function getUserData(username) {
      return db.users[username] || { purchases: {}, history: [] };
    }

    function updateUserData(username, data) {
      db.users[username] = data;
      saveDB(db);
    }

    function addHistory(username, docId, action) {
      const user = getUserData(username);
      user.history.unshift({
        docId,
        action, // 'view' hoặc 'buy'
        timestamp: new Date().toISOString()
      });
      if (user.history.length > 30) user.history.pop();
      updateUserData(username, user);
    }

    // ---------- BẢO VỆ TÀI LIỆU ----------
    function generateWatermark(username) {
      return `${username} • ${new Date().toLocaleDateString('vi-VN')} • LookMax Archive`;
    }

    // Canvas + watermark động (chống screenshot cơ bản)
    function renderProtectedContent(doc, username) {
      const container = document.createElement('div');
      container.className = 'protected-content';
      container.style.position = 'relative';

      const watermarkDiv = document.createElement('div');
      watermarkDiv.className = 'watermark';
      watermarkDiv.textContent = generateWatermark(username);
      container.appendChild(watermarkDiv);

      const contentDiv = document.createElement('div');
      contentDiv.style.position = 'relative';
      contentDiv.style.zIndex = '2';
      contentDiv.innerHTML = `<h3>${doc.title}</h3><p style="margin-top:16px; white-space:pre-wrap;">${doc.content}</p>`;
      container.appendChild(contentDiv);

      // Chặn chuột phải, kéo thả
      container.addEventListener('contextmenu', e => e.preventDefault());
      container.addEventListener('dragstart', e => e.preventDefault());
      
      // Vô hiệu hóa selection copy (đã có CSS user-select)
      return container;
    }

    // ---------- RENDER UI ----------
    const app = document.getElementById('app');

    function renderAll() {
      if (!currentUser) {
        renderLoginRegister();
      } else {
        renderMainApp();
      }
    }

    function renderLoginRegister() {
      app.innerHTML = `
        <div class="header">
          <span class="logo">LookMax Archive</span>
        </div>
        <div class="auth-modal" id="authBox">
          <h3 style="margin-bottom:8px;">Đăng nhập / Đăng ký</h3>
          <input type="text" class="input" id="usernameInput" placeholder="Tên tài khoản" autocomplete="off">
          <div style="display:flex; gap:12px;">
            <button class="btn btn-primary" id="loginBtn">Đăng nhập</button>
            <button class="btn" id="registerBtn">Tạo tài khoản mới</button>
          </div>
          <p style="font-size:0.8rem; color:var(--text2);">Dữ liệu lưu cục bộ trình duyệt.</p>
        </div>
      `;

      document.getElementById('loginBtn').addEventListener('click', () => {
        const username = document.getElementById('usernameInput').value.trim();
        if (!username) return alert('Nhập tên tài khoản');
        if (!db.users[username]) return alert('Tài khoản không tồn tại.');
        currentUser = username;
        setSession(username);
        renderAll();
      });

      document.getElementById('registerBtn').addEventListener('click', () => {
        const username = document.getElementById('usernameInput').value.trim();
        if (!username) return alert('Nhập tên tài khoản');
        if (db.users[username]) return alert('Tài khoản đã tồn tại, hãy đăng nhập.');
        db.users[username] = { purchases: {}, history: [] };
        saveDB(db);
        currentUser = username;
        setSession(username);
        renderAll();
      });
    }

    function renderMainApp() {
      const userData = getUserData(currentUser);
      const docs = db.documents;

      const purchasedDocs = docs.filter(d => userData.purchases[d.id]);
      const availableDocs = docs.filter(d => !userData.purchases[d.id]);

      app.innerHTML = `
        <div class="header">
          <span class="logo">LookMax Archive</span>
          <div class="user-area">
            <span class="username-display">👤 ${currentUser}</span>
            <button class="btn btn-small" id="logoutBtn">Đăng xuất</button>
          </div>
        </div>

        <div>
          <div class="section-title">📚 Tài liệu đã mua</div>
          <div class="doc-grid" id="purchasedGrid">
            ${purchasedDocs.length === 0 ? '<p style="color:var(--text2);">Chưa có tài liệu nào.</p>' : ''}
            ${purchasedDocs.map(d => `
              <div class="doc-card owned" data-docid="${d.id}">
                <div class="doc-title">${d.title}</div>
                <div class="doc-meta"><span>Đã sở hữu</span><span class="price">✓</span></div>
                <button class="btn btn-small view-doc" data-docid="${d.id}">📖 Xem</button>
              </div>
            `).join('')}
          </div>
        </div>

        <div>
          <div class="section-title">🛒 Tài liệu bán</div>
          <div class="doc-grid" id="availableGrid">
            ${availableDocs.map(d => `
              <div class="doc-card" data-docid="${d.id}">
                <div class="doc-title">${d.title}</div>
                <div class="doc-meta"><span>${d.preview || ''}</span><span class="price">${formatMoney(d.price)}</span></div>
                <button class="btn btn-primary btn-small buy-doc" data-docid="${d.id}">💳 Mua ngay</button>
              </div>
            `).join('')}
          </div>
        </div>

        <div>
          <div class="section-title">🕒 Lịch sử hoạt động</div>
          <div class="history-list" id="historyList">
            ${userData.history.length === 0 ? '<p style="color:var(--text2);">Chưa có hoạt động.</p>' : ''}
            ${userData.history.slice(0, 10).map(h => {
              const doc = docs.find(d => d.id === h.docId);
              return `<div class="history-item"><span>${doc?.title || h.docId}</span><span>${h.action === 'buy' ? '🛒 Mua' : '👁 Xem'} • ${new Date(h.timestamp).toLocaleString('vi-VN')}</span></div>`;
            }).join('')}
          </div>
        </div>
      `;

      // Event listeners
      document.getElementById('logoutBtn').addEventListener('click', () => {
        clearSession();
        currentUser = null;
        renderAll();
      });

      // Mua tài liệu
      document.querySelectorAll('.buy-doc').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const docId = btn.dataset.docid;
          const doc = db.documents.find(d => d.id === docId);
          if (!doc) return;
          if (confirm(`Xác nhận mua "${doc.title}" với giá ${formatMoney(doc.price)}?`)) {
            const user = getUserData(currentUser);
            user.purchases[docId] = { purchasedAt: new Date().toISOString() };
            updateUserData(currentUser, user);
            addHistory(currentUser, docId, 'buy');
            renderAll();
          }
        });
      });

      // Xem tài liệu
      document.querySelectorAll('.view-doc').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const docId = btn.dataset.docid;
          openDocViewer(docId);
        });
      });
    }

    function openDocViewer(docId) {
      const doc = db.documents.find(d => d.id === docId);
      if (!doc) return;
      const userData = getUserData(currentUser);
      if (!userData.purchases[docId]) {
        alert('Bạn chưa mua tài liệu này.');
        return;
      }

      addHistory(currentUser, docId, 'view');

      const overlay = document.createElement('div');
      overlay.className = 'viewer-overlay';
      const container = document.createElement('div');
      container.className = 'viewer-container';

      container.innerHTML = `
        <div class="viewer-header">
          <strong>${doc.title}</strong>
          <button class="btn btn-small" id="closeViewer">✕ Đóng</button>
        </div>
      `;

      const protectedArea = renderProtectedContent(doc, currentUser);
      container.appendChild(protectedArea);
      overlay.appendChild(container);
      document.body.appendChild(overlay);

      document.getElementById('closeViewer').addEventListener('click', () => {
        document.body.removeChild(overlay);
      });

      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) document.body.removeChild(overlay);
      });

      // Chặn PrintScreen + phím tắt (hạn chế)
      const blockKeys = (e) => {
        if (e.key === 'PrintScreen' || (e.ctrlKey && e.key === 'p') || (e.ctrlKey && e.key === 's')) {
          e.preventDefault();
          return false;
        }
      };
      document.addEventListener('keydown', blockKeys);
      overlay.addEventListener('remove', () => document.removeEventListener('keydown', blockKeys), { once: true });
    }

    // Tự động đăng nhập nếu có session
    if (currentUser && db.users[currentUser]) {
      renderMainApp();
    } else {
      clearSession();
      currentUser = null;
      renderAll();
    }
  })();
</script>
</body>
</html>
