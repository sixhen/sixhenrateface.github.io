<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=yes, viewport-fit=cover">
  <title>Ảnh Marker - Black Highlighter</title>
  <style>
    /* Reset và font cơ bản */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    body {
      background: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      height: 100vh;
      overflow: hidden;
      touch-action: manipulation; /* tối ưu cảm ứng */
    }

    /* Container chính */
    .app {
      width: 100%;
      max-width: 480px;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: #1a1a1a;
      box-shadow: 0 0 30px rgba(0,0,0,0.7);
      position: relative;
      overflow: hidden;
    }

    /* Thanh tiêu đề */
    .header {
      padding: 12px 16px;
      background: #202020;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 600;
      font-size: 1.1rem;
      border-bottom: 1px solid #333;
      letter-spacing: 0.5px;
    }
    .header span {
      opacity: 0.9;
    }

    /* Khu vực canvas chính */
    .canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none; /* quan trọng cho gesture zoom/pan */
    }

    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      transition: filter 0.2s;
    }

    /* Thanh công cụ dưới cùng */
    .toolbar {
      background: #202020;
      padding: 10px 12px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-top: 1px solid #333;
      z-index: 10;
    }

    /* Nút chung */
    button {
      background: #2c2c2c;
      border: none;
      color: #ddd;
      padding: 8px 12px;
      border-radius: 24px;
      font-size: 0.9rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid #3a3a3a;
      white-space: nowrap;
      backdrop-filter: blur(4px);
      letter-spacing: 0.3px;
    }
    button:active {
      background: #3d3d3d;
      transform: scale(0.96);
      border-color: #555;
    }
    button.accent {
      background: #4a4a4a;
      border-color: #666;
      color: white;
      font-weight: 600;
    }
    button:disabled {
      opacity: 0.4;
      pointer-events: none;
      transform: none;
    }

    /* Slider kích thước bút */
    .brush-size {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #2c2c2c;
      padding: 4px 12px;
      border-radius: 24px;
      border: 1px solid #3a3a3a;
    }
    .brush-size label {
      font-size: 0.8rem;
      color: #aaa;
      margin-right: 2px;
    }
    input[type="range"] {
      width: 70px;
      height: 6px;
      -webkit-appearance: none;
      background: #444;
      border-radius: 5px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      background: #ccc;
      border-radius: 50%;
      border: 2px solid #888;
      cursor: pointer;
      transition: 0.1s;
    }
    #brushValue {
      min-width: 30px;
      text-align: center;
      font-weight: 600;
      color: #ddd;
    }

    /* Khu vực chọn ảnh ban đầu (overlay) */
    .image-picker {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      background: rgba(20,20,20,0.9);
      padding: 12px 20px;
      border-radius: 40px;
      backdrop-filter: blur(10px);
      border: 1px solid #444;
      z-index: 20;
      transition: opacity 0.3s;
    }
    .image-picker.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .file-label {
      background: #3a3a3a;
      padding: 10px 20px;
      border-radius: 30px;
      color: white;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    #cameraBtn {
      background: #4a4a4a;
    }

    /* Responsive nhỏ */
    @media (max-width: 400px) {
      .toolbar button {
        padding: 6px 10px;
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <span>✏️ Marker Đen</span>
    <span style="font-size:0.8rem; opacity:0.7;">Kéo để tô</span>
  </div>

  <!-- Canvas container -->
  <div class="canvas-container" id="canvasContainer">
    <canvas id="mainCanvas"></canvas>
    <!-- Bộ chọn ảnh (hiện khi chưa có ảnh) -->
    <div class="image-picker" id="imagePicker">
      <label for="fileInput" class="file-label">🖼️ Thư viện</label>
      <input type="file" id="fileInput" accept="image/*" style="display:none;">
      <button id="cameraBtn" class="file-label">📷 Chụp ảnh</button>
      <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button id="undoBtn" disabled>↩️</button>
    <button id="redoBtn" disabled>↪️</button>
    <div class="brush-size">
      <label>🖊️</label>
      <input type="range" id="brushSlider" min="8" max="60" value="24" step="1">
      <span id="brushValue">24</span>
    </div>
    <button id="clearBtn">🧹 Xóa hết</button>
    <button id="saveBtn" class="accent">💾 Lưu PNG</button>
  </div>
</div>

<script>
  (function() {
    // ----- PHẦN TỬ DOM -----
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const container = document.getElementById('canvasContainer');
    const imagePicker = document.getElementById('imagePicker');
    const fileInput = document.getElementById('fileInput');
    const cameraInput = document.getElementById('cameraInput');
    const cameraBtn = document.getElementById('cameraBtn');
    const undoBtn = document.getElementById('undoBtn');
    const redoBtn = document.getElementById('redoBtn');
    const clearBtn = document.getElementById('clearBtn');
    const saveBtn = document.getElementById('saveBtn');
    const brushSlider = document.getElementById('brushSlider');
    const brushValue = document.getElementById('brushValue');

    // ----- TRẠNG THÁI -----
    let img = null;                 // Đối tượng Image gốc
    let imgNaturalWidth = 0;
    let imgNaturalHeight = 0;

    // Biến đổi hình ảnh (pan/zoom)
    let scale = 1.0;
    let offsetX = 0;
    let offsetY = 0;

    // Lịch sử undo/redo (lưu trữ DataURL của canvas chính)
    const historyStack = [];
    const MAX_HISTORY = 50;
    let historyIndex = -1;

    // Vẽ marker
    let isDrawing = false;
    let brushSize = 24;
    let lastX = 0, lastY = 0;

    // Touch/gesture
    let touchMode = null;          // 'draw', 'pan', 'pinch'
    let initialPinchDistance = 0;
    let initialScale = 1.0;
    let initialOffsetX = 0, initialOffsetY = 0;
    let pinchMidX = 0, pinchMidY = 0;
    let panStartX = 0, panStartY = 0;
    let panStartOffsetX = 0, panStartOffsetY = 0;

    // ----- HÀM TIỆN ÍCH -----
    function saveStateToHistory() {
      // Xóa các redo phía trước nếu có
      if (historyIndex < historyStack.length - 1) {
        historyStack.splice(historyIndex + 1);
      }
      // Lưu trạng thái canvas hiện tại
      historyStack.push(canvas.toDataURL('image/png'));
      if (historyStack.length > MAX_HISTORY) {
        historyStack.shift();
      } else {
        historyIndex++;
      }
      updateUndoRedoButtons();
    }

    function restoreState(dataURL) {
      return new Promise((resolve) => {
        const imgRestore = new Image();
        imgRestore.onload = () => {
          // Vẽ lại toàn bộ canvas với ảnh đã lưu (giữ nguyên kích thước canvas)
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(imgRestore, 0, 0);
          resolve();
        };
        imgRestore.src = dataURL;
      });
    }

    async function undo() {
      if (historyIndex <= 0) return;
      historyIndex--;
      await restoreState(historyStack[historyIndex]);
      updateUndoRedoButtons();
    }

    async function redo() {
      if (historyIndex >= historyStack.length - 1) return;
      historyIndex++;
      await restoreState(historyStack[historyIndex]);
      updateUndoRedoButtons();
    }

    function updateUndoRedoButtons() {
      undoBtn.disabled = historyIndex <= 0;
      redoBtn.disabled = historyIndex >= historyStack.length - 1;
    }

    // Reset lịch sử với ảnh nền hiện tại
    function resetHistoryWithCurrentCanvas() {
      historyStack.length = 0;
      historyIndex = -1;
      saveStateToHistory(); // Lưu trạng thái ban đầu
    }

    // Vẽ lại toàn bộ canvas: nền ảnh (đã transform) + lớp marker hiện tại.
    // Lưu ý: marker được vẽ trực tiếp lên canvas, nên không cần lớp riêng.
    function redrawCanvas() {
      if (!img) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      // Vẽ ảnh với biến đổi
      ctx.save();
      ctx.translate(offsetX, offsetY);
      ctx.scale(scale, scale);
      ctx.drawImage(img, 0, 0, imgNaturalWidth, imgNaturalHeight);
      ctx.restore();
    }

    // Khởi tạo canvas sau khi có ảnh
    function initCanvasWithImage(imageElement) {
      img = imageElement;
      imgNaturalWidth = img.naturalWidth;
      imgNaturalHeight = img.naturalHeight;

      // Tính kích thước canvas vừa container (tối đa chiều rộng, giữ tỉ lệ)
      const containerWidth = container.clientWidth;
      const containerHeight = container.clientHeight;
      const imgRatio = imgNaturalWidth / imgNaturalHeight;
      let canvasWidth = containerWidth;
      let canvasHeight = canvasWidth / imgRatio;

      if (canvasHeight > containerHeight) {
        canvasHeight = containerHeight;
        canvasWidth = canvasHeight * imgRatio;
      }

      canvas.width = canvasWidth;
      canvas.height = canvasHeight;

      // Reset biến đổi: căn giữa ảnh trong canvas
      scale = Math.min(canvasWidth / imgNaturalWidth, canvasHeight / imgNaturalHeight);
      offsetX = (canvasWidth - imgNaturalWidth * scale) / 2;
      offsetY = (canvasHeight - imgNaturalHeight * scale) / 2;

      redrawCanvas();
      resetHistoryWithCurrentCanvas();
      imagePicker.classList.add('hidden');
    }

    // Tải ảnh từ file
    function loadImageFromFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const imageObj = new Image();
        imageObj.onload = () => initCanvasWithImage(imageObj);
        imageObj.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    // ----- SỰ KIỆN CHỌN ẢNH -----
    fileInput.addEventListener('change', (e) => {
      if (e.target.files && e.target.files[0]) {
        loadImageFromFile(e.target.files[0]);
      }
      fileInput.value = ''; // reset để có thể chọn lại cùng file
    });

    cameraBtn.addEventListener('click', () => {
      cameraInput.click();
    });
    cameraInput.addEventListener('change', (e) => {
      if (e.target.files && e.target.files[0]) {
        loadImageFromFile(e.target.files[0]);
      }
      cameraInput.value = '';
    });

    // ----- CẬP NHẬT BRUSH -----
    brushSlider.addEventListener('input', (e) => {
      brushSize = parseInt(e.target.value, 10);
      brushValue.textContent = brushSize;
    });
    brushSize = parseInt(brushSlider.value, 10);
    brushValue.textContent = brushSize;

    // ----- CHUYỂN ĐỔI TỌA ĐỘ CHUỘT/CẢM ỨNG SANG TỌA ĐỘ CANVAS -----
    function getCanvasCoords(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;   // tỉ lệ canvas thực tế so với hiển thị CSS
      const scaleY = canvas.height / rect.height;
      const canvasX = (clientX - rect.left) * scaleX;
      const canvasY = (clientY - rect.top) * scaleY;
      return { x: canvasX, y: canvasY };
    }

    // ----- VẼ MARKER (đen) -----
    function drawMarker(x, y) {
      ctx.save();
      // Vẽ trong không gian canvas (không transform)
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = '#000000';
      ctx.beginPath();
      ctx.arc(x, y, brushSize / 2, 0, Math.PI * 2);
      ctx.fill();
      // Làm mịn bằng cách vẽ thêm các điểm nếu khoảng cách lớn (tùy chọn)
      ctx.restore();
    }

    function handleDrawStart(x, y) {
      isDrawing = true;
      lastX = x;
      lastY = y;
      drawMarker(x, y);
      // Lưu trạng thái trước khi vẽ nét mới? Sẽ lưu khi kết thúc nét.
    }

    function handleDrawMove(x, y) {
      if (!isDrawing) return;
      // Vẽ đường nối giữa các điểm để mượt
      ctx.save();
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = '#000000';
      ctx.strokeStyle = '#000000';
      ctx.lineWidth = brushSize;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(x, y);
      ctx.stroke();
      // Vẽ thêm hình tròn tại điểm hiện tại để che khớp nối
      ctx.beginPath();
      ctx.arc(x, y, brushSize / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      lastX = x;
      lastY = y;
    }

    function handleDrawEnd() {
      if (isDrawing) {
        isDrawing = false;
        saveStateToHistory(); // Lưu sau khi hoàn thành nét vẽ
      }
    }

    // ----- GESTURE: PAN & PINCH -----
    function getTouchDistance(touches) {
      if (touches.length < 2) return 0;
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function getTouchMidpoint(touches) {
      const x = (touches[0].clientX + touches[1].clientX) / 2;
      const y = (touches[0].clientY + touches[1].clientY) / 2;
      return { x, y };
    }

    // ----- SỰ KIỆN CHUỘT -----
    canvas.addEventListener('mousedown', (e) => {
      if (!img) return;
      e.preventDefault();
      const coords = getCanvasCoords(e.clientX, e.clientY);
      // Chỉ vẽ khi chuột trái (button 0)
      if (e.button === 0) {
        handleDrawStart(coords.x, coords.y);
      }
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDrawing || !img) return;
      e.preventDefault();
      const coords = getCanvasCoords(e.clientX, e.clientY);
      handleDrawMove(coords.x, coords.y);
    });

    window.addEventListener('mouseup', (e) => {
      if (isDrawing) {
        handleDrawEnd();
      }
    });

    // ----- SỰ KIỆN CẢM ỨNG (Touch) -----
    canvas.addEventListener('touchstart', (e) => {
      if (!img) return;
      e.preventDefault();
      const touches = e.touches;

      if (touches.length === 1) {
        // Một ngón: bắt đầu vẽ hoặc pan (ưu tiên vẽ nếu không có cử chỉ đặc biệt)
        // Ở đây chúng ta dùng vẽ là chính, pan khi dùng 2 ngón.
        const coords = getCanvasCoords(touches[0].clientX, touches[0].clientY);
        handleDrawStart(coords.x, coords.y);
        touchMode = 'draw';
      } else if (touches.length === 2) {
        // Hai ngón: pinch zoom và pan
        if (isDrawing) {
          handleDrawEnd(); // kết thúc nét vẽ nếu đang vẽ
        }
        touchMode = 'pinch';
        initialPinchDistance = getTouchDistance(touches);
        initialScale = scale;
        const mid = getTouchMidpoint(touches);
        pinchMidX = mid.x;
        pinchMidY = mid.y;
        // Lưu offset hiện tại
        initialOffsetX = offsetX;
        initialOffsetY = offsetY;
      }
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      if (!img) return;
      e.preventDefault();
      const touches = e.touches;

      if (touchMode === 'draw' && touches.length === 1) {
        const coords = getCanvasCoords(touches[0].clientX, touches[0].clientY);
        handleDrawMove(coords.x, coords.y);
      } else if (touchMode === 'pinch' && touches.length === 2) {
        // Tính toán scale mới
        const currentDist = getTouchDistance(touches);
        if (initialPinchDistance > 0) {
          let newScale = initialScale * (currentDist / initialPinchDistance);
          newScale = Math.min(Math.max(newScale, 0.5), 4.0); // giới hạn zoom
          
          // Tính toán offset để zoom vào điểm giữa
          const mid = getTouchMidpoint(touches);
          const rect = canvas.getBoundingClientRect();
          const canvasMidX = (mid.x - rect.left) * (canvas.width / rect.width);
          const canvasMidY = (mid.y - rect.top) * (canvas.height / rect.height);
          
          // Công thức zoom hướng tới điểm
          const scaleChange = newScale / initialScale;
          offsetX = canvasMidX - (canvasMidX - initialOffsetX) * scaleChange;
          offsetY = canvasMidY - (canvasMidY - initialOffsetY) * scaleChange;
          
          scale = newScale;
        }
        redrawCanvas();
      }
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
      if (!img) return;
      e.preventDefault();
      if (touchMode === 'draw' && isDrawing) {
        handleDrawEnd();
      }
      touchMode = null;
      // Nếu còn 1 ngón sau khi nhấc 1 ngón từ 2 ngón, có thể chuyển sang draw? Tạm thời dừng.
      if (e.touches.length === 0) {
        touchMode = null;
      }
    });

    canvas.addEventListener('touchcancel', (e) => {
      if (isDrawing) handleDrawEnd();
      touchMode = null;
    });

    // ----- CÁC NÚT CHỨC NĂNG -----
    undoBtn.addEventListener('click', undo);
    redoBtn.addEventListener('click', redo);

    clearBtn.addEventListener('click', () => {
      if (!img) return;
      // Xóa toàn bộ marker: vẽ lại canvas chỉ với ảnh gốc
      redrawCanvas();
      saveStateToHistory();
    });

    saveBtn.addEventListener('click', () => {
      if (!img) {
        alert('Vui lòng chọn ảnh trước.');
        return;
      }
      // Xuất canvas thành PNG chất lượng cao
      const dataURL = canvas.toDataURL('image/png');
      const link = document.createElement('a');
      link.download = `marker_${Date.now()}.png`;
      link.href = dataURL;
      link.click();
    });

    // Khởi tạo trạng thái nút
    updateUndoRedoButtons();

    // Xử lý khi thay đổi kích thước cửa sổ (đơn giản)
    window.addEventListener('resize', () => {
      if (img) {
        // Giữ nguyên canvas, không tự động scale lại để tránh mất dữ liệu.
        // Có thể cập nhật lại nếu muốn, nhưng giữ ổn định.
      }
    });

    // Ẩn image picker nếu đã có ảnh (mặc định hiện)
    // Khi người dùng chọn ảnh, picker sẽ ẩn.
  })();
</script>
</body>
</html>
